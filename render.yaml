services:
  - type: web
    name: first-question-game
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: DATA_DIR
        value: /tmp/first-question-data
      - key: OPENAI_API_KEY
        sync: false
